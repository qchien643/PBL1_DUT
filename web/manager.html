<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quản lý</title>
  <link rel="stylesheet" href="/assets/app.css" />
</head>
<body>
  <div id="toast-root" class="toast-root"></div>
  <main class="shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">Quản lý nhà hàng</p>
        <h1>Quản lý</h1>
        <p class="muted">Cập nhật tình trạng món, xem doanh thu và nhật ký thao tác.</p>
      </div>
      <div class="actions">
        <button class="button ghost" onclick="loadManagerData()">Tải lại</button>
        <a class="button ghost" href="/">Trang chính</a>
      </div>
    </header>

    <section class="layout two">
      <section class="card">
        <h2>Tình trạng món</h2>
        <div id="manager-menu" class="list"></div>
      </section>
      <aside class="stack">
        <section class="card">
          <h2>Tổng quan doanh thu</h2>
          <div id="summary" class="summary"></div>
        </section>
        <section class="card">
          <h2>Nhật ký thao tác</h2>
          <div id="audit-log" class="list"></div>
        </section>
      </aside>
    </section>
  </main>

  <script src="/assets/api.js"></script>
  <script src="/assets/notifications.js"></script>
  <script src="/assets/manager.js"></script>
</body>
</html>
