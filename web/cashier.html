<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thu ngân</title>
  <link rel="stylesheet" href="/assets/app.css" />
</head>
<body>
  <div id="toast-root" class="toast-root"></div>
  <main class="shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">Quầy thu ngân</p>
        <h1>Thu ngân</h1>
        <p class="muted">Mở bàn, duyệt đơn món, xử lý hủy món và thanh toán.</p>
      </div>
      <div class="actions">
        <button class="button ghost" onclick="loadCashierData()">Tải lại</button>
        <a class="button ghost" href="/">Trang chính</a>
      </div>
    </header>

    <section class="dashboard">
      <section class="card">
        <div class="section-title">
          <h2>Sơ đồ bàn</h2>
        </div>
        <div id="table-tools" class="toolbox"></div>
        <div id="tables" class="list"></div>
      </section>

      <section class="card">
        <h2>Đơn chờ duyệt</h2>
        <div id="pending-orders" class="list"></div>
      </section>

      <section class="card">
        <h2>Yêu cầu hủy món</h2>
        <div id="cancel-requests" class="list"></div>
      </section>

      <section class="card">
        <h2>Sự cố bếp và quầy nước</h2>
        <div id="kitchen-issues" class="list"></div>
      </section>

      <section class="card">
        <h2>Hóa đơn chờ thanh toán</h2>
        <div id="open-bills" class="list"></div>
      </section>
    </section>
  </main>

  <script src="/assets/api.js"></script>
  <script src="/assets/notifications.js"></script>
  <script src="/assets/cashier.js"></script>
</body>
</html>
